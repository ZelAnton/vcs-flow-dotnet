name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      # Config is .yamllint.yml — tuned for Actions YAML. Real defects (tabs,
      # duplicate keys, bad indentation) fail; cosmetic line-length stays a
      # non-failing warning.
      - name: Lint YAML
        run: yamllint .

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Actions are pinned to a full commit SHA (supply-chain hardening); the
      # trailing comment records the human-readable version. Dependabot bumps the
      # SHA and updates the comment on its weekly run.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.0.x'

      # Cache the global NuGet package folder across runs. Keyed on the central
      # version files so the cache invalidates only when dependencies change.
      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props', 'nuget.config', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      # Test results are uploaded even when the Test step fails, so a red CI run
      # can be diagnosed from the .trx without re-running locally.
      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults/*.trx
          if-no-files-found: ignore

  # Each command ships as a Native-AOT executable, so the native publish is part
  # of CI: a reflection/trim regression that the build-time analyzers miss still
  # fails here. Linux needs clang to link; Windows runners already have the MSVC
  # toolchain.
  aot-publish:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # project = PascalCase folder/csproj suffix (case-sensitive on Linux);
        # bin = the AssemblyName the native executable is produced under.
        command:
          - {project: Commit, bin: commit}
          - {project: Push, bin: push}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Install AOT native toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props', 'nuget.config', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Publish ${{ matrix.command.bin }} (Native AOT)
        run: >
          dotnet publish src/Vcs.Flow.${{ matrix.command.project }}/Vcs.Flow.${{ matrix.command.project }}.csproj
          --configuration Release

      # Confirm the native binary was actually produced (not just that codegen
      # ran). bash is available on every runner, including Windows.
      - name: Verify native binary exists
        shell: bash
        run: |
          set -euo pipefail
          root="src/Vcs.Flow.${{ matrix.command.project }}/bin/Release"
          # -print -quit makes find stop at the first match itself, so there is no
          # SIGPIPE from a closed `head` pipe aborting the script under pipefail;
          # restrict to the publish/ output so it is the native binary, not a build apphost.
          bin=$(find "$root" -type f -path '*/publish/*' \( -name '${{ matrix.command.bin }}' -o -name '${{ matrix.command.bin }}.exe' \) -print -quit)
          if [[ -z "$bin" ]]; then
            echo "::error::Native AOT binary for '${{ matrix.command.bin }}' was not produced."
            exit 1
          fi
          echo "Produced: $bin"
